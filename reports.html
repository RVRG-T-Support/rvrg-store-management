<!DOCTYPE html>
<html>
<head>
    <title>RVRG Reports</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Reports</h1>

<a href="index.html">Dashboard</a>

<hr>

<h2>Stock Movement Report</h2>

<input type="date" id="fromDate">

<input type="date" id="toDate">

<button onclick="loadStockMovement()">
    Load Movement
</button>

<br><br>

<table border="1" id="movementTable">

    <thead>
        <tr>
            <th>Date</th>
            <th>Material</th>
            <th>Transaction</th>
            <th>Quantity</th>
            <th>Reference</th>
        </tr>
    </thead>

    <tbody></tbody>

</table>

<hr>
<h2>Current Stock Report</h2>

<button onclick="loadCurrentStock()">
    Refresh Report
</button>
    
<button onclick="exportCurrentStock()">
    Export Excel
</button>
    
<table border="1" id="stockReportTable">

    <thead>
        <tr>
            <th>Code</th>
            <th>Material</th>
            <th>Department</th>
            <th>Stock</th>
            <th>Unit</th>
        </tr>
    </thead>

    <tbody></tbody>

</table>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="reports.js"></script>

</body>
</html>
