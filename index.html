<!DOCTYPE html>
<html>
<head>
    <title>RVRG Store Management</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>RVRG Store Management</h1>

<h2>Add Material</h2>

<div>

<select id="departmentId">
    <option value="">Select Department</option>
</select>

<input type="text" id="category" placeholder="Category (Optional)">

<input type="text" id="materialName" placeholder="Material Name">

<input type="text" id="brand" placeholder="Brand (Optional)">

<input type="text" id="itemType" placeholder="Type (Optional)">

<input type="text" id="itemSize" placeholder="Size (Optional)">

<input type="text" id="rating" placeholder="Rating (Optional)">

<input type="text" id="specification" placeholder="Specification (Optional)">

<input type="text" id="rackLocation" placeholder="Rack Location (Optional)">

<input type="text" id="description" placeholder="Description (Optional)">

<select id="unit">
    <option value="">Select Unit</option>
    <option>Nos</option>
    <option>Bag</option>
    <option>Box</option>
    <option>Ltr</option>
    <option>Kg</option>
    <option>Mtr</option>
    <option>Sqft</option>
    <option>Roll</option>
    <option>Coil</option>
    <option>Set</option>
    <option>Pair</option>
    <option>Pkt</option>
    <option>Gram</option>
    <option>ML</option>
</select>

<input type="number"
       id="minimumStock"
       placeholder="Minimum Stock">

<button onclick="addMaterial()">
    Save Material
</button>

</div>

<hr>

<h2>Stock Entry</h2>

<select id="stockMaterial">
    <option value="">Select Material</option>
</select>

<input type="number"
       id="stockQty"
       placeholder="Quantity">

<input type="text"
       id="referenceNo"
       placeholder="Reference No">

<input type="text"
       id="stockRemarks"
       placeholder="Remarks">

<button onclick="addStock()">
    Add Stock
</button>

<hr>

<h2>Low Stock Alerts</h2>

<table border="1" id="lowStockTable">
    <thead>
        <tr>
            <th>Code</th>
            <th>Material</th>
            <th>Current Stock</th>
            <th>Minimum Stock</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<hr>

<h2>Materials List</h2>

<button onclick="loadMaterials()">
    Refresh List
</button>

<br><br>

<table border="1" id="materialsTable">
    <thead>
        <tr>
            <th>Code</th>
            <th>Name</th>
            <th>Department</th>
            <th>Stock</th>
            <th>Unit</th>
            <th>Min Stock</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="app.js"></script>

</body>
</html>
